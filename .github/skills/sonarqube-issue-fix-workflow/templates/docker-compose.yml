version: '3.8'

services:
  sonarqube-postgres:
    image: postgres:15
    container_name: sonarqube-postgres
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonarpassword
      POSTGRES_DB: sonarqube
    volumes:
      - sonarqube-db-volume:/var/lib/postgresql/data
    networks:
      - sonarqube-network
    command: postgres -c max_wal_size=1GB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 10s
      timeout: 5s
      retries: 5

  sonarqube:
    image: sonarqube:latest-community
    container_name: sonarqube
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-postgres:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonarpassword
    volumes:
      - sonarqube-data-volume:/opt/sonarqube/data
      - sonarqube-logs-volume:/opt/sonarqube/logs
      - sonarqube-extensions-volume:/opt/sonarqube/extensions
    networks:
      - sonarqube-network
    depends_on:
      sonarqube-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/api/system/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

networks:
  sonarqube-network:
    driver: bridge

volumes:
  sonarqube-db-volume:
    driver: local
  sonarqube-data-volume:
    driver: local
  sonarqube-logs-volume:
    driver: local
  sonarqube-extensions-volume:
    driver: local
